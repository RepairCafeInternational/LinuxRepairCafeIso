loadfont unicode

set color_normal=white/black
set color_highlight=black/light-gray

menuentry "Start Linux Repair Cafe (Cinnamon)" --class linuxmint {
	set gfxpayload=keep
	linux	/casper/vmlinuz  boot=casper username=mint hostname=mint iso-scan/filename=${iso_path} quiet splash --
	initrd	/casper/initrd.lz
}
menuentry "Start Linux Repair Cafe (XFCE)" --class linuxmint {
	set gfxpayload=keep
	linux	/casper/vmlinuz  boot=casper username=mint hostname=mint iso-scan/filename=${iso_path} lrc_session=xfce quiet splash --
	initrd	/casper/initrd.lz
}
menuentry "Start Linux Repair Cafe (terminal only)" {
	linux	/casper/vmlinuz  boot=casper username=mint hostname=mint iso-scan/filename=${iso_path} systemd.unit=multi-user.target nosplash --
	initrd	/casper/initrd.lz
}
menuentry "Start Linux Repair Cafe (Cinnamon compatibility mode)" {
	linux	/casper/vmlinuz  boot=casper username=mint hostname=mint iso-scan/filename=${iso_path} noapic noacpi nosplash irqpoll nomodeset --
	initrd	/casper/initrd.lz
}
grub_platform
if [ "$grub_platform" = "efi" ]; then
menuentry 'Boot from next volume' {
	exit 1
}
menuentry 'UEFI Firmware Settings' {
	fwsetup
}
menuentry 'Memory test' {
	linux	/boot/memtest.efi
}
fi
